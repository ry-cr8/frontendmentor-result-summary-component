<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main>
      <div class="parent-container">
        <div class="left-child">
          <h3 class="result-text">Your Result</h3>
          <div class="score-container">
            <h1 class="score-text">76</h1>
            <h5 class="score-text-over">of 100</h5>
          </div>
          <h2 class="remarks-text">Great</h2>
          <p class="paragraph-text">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>

        <div class="right-child">
          <h3 class="sum">Summary</h3>
          <div class="summary-container">
            <div class="summary-content" id="sum1">
              <img
                src="assets/images/icon-reaction.svg"
                alt="reaction icon"
                class="icon"
              />Reaction <span class="score"><strong>80</strong> / 100</span>
            </div>
            <div class="summary-content" id="sum2">
              <img
                src="assets/images/icon-memory.svg"
                alt="memory-icon"
                class="icon"
              />Memory <span class="score"><strong>92</strong> / 100</span>
            </div>
            <div class="summary-content" id="sum3">
              <img
                src="assets/images/icon-verbal.svg"
                alt="verbal icon"
                class="icon"
              />Verbal <span class="score"><strong>61</strong> / 100</span>
            </div>
            <div class="summary-content" id="sum4">
              <img
                src="assets/images/icon-visual.svg"
                alt="visual icon"
                class="icon"
              />Visual <span class="score"><strong>72</strong> / 100</span>
            </div>
          </div>

          <div class="contbtn-container">
            <button class="cont-btn">Continue</button>
          </div>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">cr8_ry</a>.
    </footer>
  </body>
</html>
